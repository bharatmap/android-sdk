name: Publish Maven Artifact

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate staged AAR
        run: |
          test -f "${GITHUB_WORKSPACE}/releases/bharatmaps-android-${{ steps.version.outputs.version }}.aar"

      - name: Prepare gh-pages worktree
        run: |
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages origin/gh-pages

      - name: Publish Maven files
        run: |
          cd /tmp/gh-pages
          bash "${GITHUB_WORKSPACE}/scripts/publish_maven.sh" "${{ steps.version.outputs.version }}" "${GITHUB_WORKSPACE}/releases/bharatmaps-android-${{ steps.version.outputs.version }}.aar"

      - name: Commit and push
        run: |
          cd /tmp/gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          git commit -m "release: publish maven artifact ${{ steps.version.outputs.version }}"
          git push origin HEAD:gh-pages
